<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edow | Design Gallery</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./CSS/gallery.css" />
  </head>
  <body>
    <a
      href="https://wa.me/yournumber"
      target="_blank"
      rel="noopener"
      class="whatsapp-sticky"
      aria-label="Chat with us on WhatsApp"
    >
      <i class="fab fa-whatsapp"></i>
    </a>

    <header class="main-header">
      <div class="logo">
        <a href="./index.html">
          <img src="./Assests/logo1.jpeg" alt="Edow Logo" width="100" />
        </a>
      </div>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="gallery.html" class="active">Gallery</a></li>
          <li><a href="blog.html">Blogs/News</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="cart-button" aria-label="View Shopping Cart">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count">0</span>
        </button>
        <button class="menu-toggle" aria-label="Toggle Navigation Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </header>

    <main class="content-padding">
      <h1 class="page-title">Featured Collections</h1>
      <p class="page-description">
        A lookbook of our couture and ready-to-wear pieces, modeled on inspiring
        figures.
      </p>

      <section class="gallery-controls">
        <input
          type="text"
          id="gallery-search"
          placeholder="Search by theme or name..."
          onkeyup="filterGallery()"
        />

        <div class="filter-group">
          <label for="gallery-filter">Filter by Collection:</label>
          <select id="gallery-filter" onchange="filterGallery()">
            <option value="all">All Collections</option>
            <option value="couture">Couture</option>
            <option value="resort">Resort Wear</option>
            <option value="formal">Formal</option>
          </select>
        </div>
      </section>

      <section id="image-gallery" class="image-gallery-grid"></section>
    </main>

    <footer class="main-footer">
      <div class="footer-logo">
        <a href="./index.html">
          <img src="edow_logo_white.png" alt="Edow Logo" />
        </a>
      </div>
      <div class="footer-links">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./gallery.html">Gallery</a></li>
          <li><a href="./blog.html">Blogs/News</a></li>
        </ul>
      </div>
      <div class="footer-social">
        <h4>Connect</h4>
        <a href="#" target="_blank" aria-label="Facebook"
          ><i class="fab fa-facebook-f"></i
        ></a>
        <a href="#" target="_blank" aria-label="Twitter"
          ><i class="fab fa-twitter"></i
        ></a>
        <a href="#" target="_blank" aria-label="Instagram"
          ><i class="fab fa-instagram"></i
        ></a>
      </div>
      <div class="footer-copyright">
        <p>&copy; 2025 Edow. All rights reserved.</p>
      </div>
    </footer>

    <div id="itemModal" class="modal">
      <div class="modal-content">
        <span class="close-button" id="close-item-modal">&times;</span>
        <img
          id="modal-image"
          src=""
          alt="Gallery Image"
          style="width: 100%; height: auto; display: block; margin-bottom: 15px"
        />
        <h2 id="modal-design-title"></h2>
        <p id="modal-design-description"></p>
        <p class="price-tag">Price: $<span id="modal-design-price"></span></p>
      </div>
    </div>

    <script src="./JavaScript/apps.js"></script>
    <script src="./JavaScript/gallery.js"></script>
  </body>
</html>
