<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edow | Fashion Blogs & News</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./CSS/blog.css" />
  </head>
  <body>
    <a
      href="https://wa.me/yournumber"
      target="_blank"
      rel="noopener noreferrer"
      class="whatsapp-sticky"
      aria-label="Chat with us on WhatsApp"
    >
      <i class="fab fa-whatsapp"></i>
    </a>

    <header class="main-header">
      <div class="logo">
        <a href="./index.html">
          <img src="edow_logo.png" alt="Edow Logo" width="100" />
        </a>
      </div>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./gallery.html">Gallery</a></li>
          <li><a href="./blog.html" class="active">Blogs/News</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="cart-button" aria-label="View Shopping Cart">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count">0</span>
        </button>
        <button class="menu-toggle" aria-label="Toggle Navigation Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </header>

    <main class="content-padding">
      <h1 class="page-title">Style Insights & Industry News</h1>
      <p class="page-description">
        Get updated information regarding the fashion industry and Edow's latest
        features.
      </p>

      <section id="blog-posts-container" class="blog-main-grid"></section>
    </main>

    <footer class="main-footer">
      <div class="footer-logo">
        <a href="./index.html">
          <img src="edow_logo_white.png" alt="Edow Logo" />
        </a>
      </div>
      <div class="footer-links">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./gallery.html">Gallery</a></li>
          <li><a href="./blog.html">Blogs/News</a></li>
        </ul>
      </div>
      <div class="footer-social">
        <h4>Connect</h4>
        <a href="#" target="_blank" aria-label="Facebook"
          ><i class="fab fa-facebook-f"></i
        ></a>
        <a href="#" target="_blank" aria-label="Twitter"
          ><i class="fab fa-twitter"></i
        ></a>
        <a href="#" target="_blank" aria-label="Instagram"
          ><i class="fab fa-instagram"></i
        ></a>
      </div>
      <div class="footer-copyright">
        <p>&copy; 2025 Edow. All rights reserved.</p>
      </div>
    </footer>

    <script src="./JavaScript/apps.js"></script>
    <script src="./JavaScript/blog.js"></script>
  </body>
</html>
