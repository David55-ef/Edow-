<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edow | Shop Our Collections</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./CSS/shop.css" />
  </head>
  <body>
    <a
      href="https://wa.me/yournumber"
      target="_blank"
      rel="noopener noreferrer"
      class="whatsapp-sticky"
      aria-label="Chat with us on WhatsApp"
    >
      <i class="fab fa-whatsapp"></i>
    </a>

    <header class="main-header">
      <div class="logo">
        <a href="./index.html">
          <img src="edow_logo.png" alt="Edow Logo" width="100" />
        </a>
      </div>
      <nav class="main-nav">
        <ul class="nav-list">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./shop.html" class="active">Shop</a></li>
          <li><a href="./gallery.html">Gallery</a></li>
          <li><a href="./blog.html">Blogs/News</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="cart-button" aria-label="View Shopping Cart">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count">0</span>
        </button>
        <button class="menu-toggle" aria-label="Toggle Navigation Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </header>

    <main class="content-padding">
      <h1 class="page-title">The Edow Shop</h1>
      <p class="page-description">
        Discover meticulously crafted shirts, trousers, shoes, and more.
      </p>

      <section class="shop-controls">
        <input
          type="text"
          id="search-bar"
          placeholder="Search products..."
          onkeyup="filterProducts()"
        />

        <div class="filter-group">
          <label for="filter-category">Category:</label>
          <select id="filter-category" onchange="filterProducts()">
            <option value="all">All Products</option>
            <option value="shirts">Shirts</option>
            <option value="trousers">Trousers/Pants</option>
            <option value="shoes">Shoes</option>
            <option value="gowns">Gowns/Dresses</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-size">Size:</label>
          <select id="filter-size" onchange="filterProducts()">
            <option value="all">All Sizes</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>
        </div>
      </section>

      <section id="product-list" class="product-grid"></section>

      <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
          <h2>Your Cart</h2>
          <button id="close-cart-btn" aria-label="Close Cart">&times;</button>
        </div>
        <div id="cart-items-container" class="cart-items">
          <p class="empty-cart-message">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
          <p>Total: $<span id="cart-total">0.00</span></p>
          <button id="checkout-btn" class="cta-button">
            Checkout (Stripe Sim.)
          </button>
        </div>
      </div>
    </main>

    <footer class="main-footer">
      <div class="footer-logo">
        <a href="./index.html">
          <img src="edow_logo_white.png" alt="Edow Logo" />
        </a>
      </div>
      <div class="footer-links">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./gallery.html">Gallery</a></li>
          <li><a href="./blog.html">Blogs/News</a></li>
        </ul>
      </div>
      <div class="footer-social">
        <h4>Connect</h4>
        <a href="#" target="_blank" aria-label="Facebook"
          ><i class="fab fa-facebook-f"></i
        ></a>
        <a href="#" target="_blank" aria-label="Twitter"
          ><i class="fab fa-twitter"></i
        ></a>
        <a href="#" target="_blank" aria-label="Instagram"
          ><i class="fab fa-instagram"></i
        ></a>
      </div>
      <div class="footer-copyright">
        <p>&copy; 2025 Edow. All rights reserved.</p>
      </div>
    </footer>

    <script src="./JavaScript/apps.js"></script>
    <script src="./JavaScript/shop.js"></script>
  </body>
</html>
